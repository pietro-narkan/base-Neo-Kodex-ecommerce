name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @neo-kodex/api prisma:generate
      - run: pnpm -r typecheck

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: neokodex
          POSTGRES_PASSWORD: neokodex
          POSTGRES_DB: neokodex_test
        ports: ['5433:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://neokodex:neokodex@localhost:5433/neokodex_test
      JWT_SECRET: test-ci-jwt
      REFRESH_SECRET: test-ci-refresh
      EMAIL_PROVIDER: noop
      PAYMENT_PROVIDER: manual
      DTE_PROVIDER: mock
      SHIPPING_PROVIDER: flat
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @neo-kodex/api prisma:generate
      - run: pnpm --filter @neo-kodex/api prisma:deploy
      - run: pnpm --filter @neo-kodex/api test
