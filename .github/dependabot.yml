version: 2
updates:
  # npm dependencies across the monorepo
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Group minor/patch updates together to reduce PR noise.
    # Security updates always open as individual PRs regardless of groups.
    groups:
      nest:
        patterns:
          - "@nestjs/*"
        update-types:
          - "minor"
          - "patch"
      fastify-plugins:
        patterns:
          - "@fastify/*"
        update-types:
          - "minor"
          - "patch"
      next-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
        update-types:
          - "minor"
          - "patch"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
