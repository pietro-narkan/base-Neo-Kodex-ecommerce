name: neo-kodex

# Production docker-compose para Coolify "Docker Compose" resource.
# Coolify resuelve SERVICE_URL_<SERVICE> (sin port) con los FQDN auto-generados
# (sslip.io o custom domain). El resto (secretos) vienen de env vars de la app.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neokodex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-neokodex}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neokodex} -d ${POSTGRES_DB:-neokodex}"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nkadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    ports:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nkadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?required}
      MINIO_BUCKET: ${MINIO_BUCKET:-neo-kodex-media}
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}) do echo 'waiting minio...' && sleep 2; done;
      /usr/bin/mc mb --ignore-existing local/$${MINIO_BUCKET};
      /usr/bin/mc anonymous set download local/$${MINIO_BUCKET};
      echo 'minio bucket ready';
      exit 0;"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-neokodex}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-neokodex}?schema=public"
      PORT: "3001"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_SECRET: ${REFRESH_SECRET:?required}
      REFRESH_EXPIRES_IN: ${REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGIN: "${SERVICE_URL_ADMIN},${SERVICE_URL_STOREFRONT}"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-nkadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-neo-kodex-media}
      MINIO_PUBLIC_URL: "${SERVICE_URL_MINIO}"
      TAX_RATE_BP: "1900"
      PAYMENT_PROVIDER: manual
      EMAIL_PROVIDER: console
      DTE_PROVIDER: mock
      SHIPPING_PROVIDER: flat
    ports:
      - "3001"

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${SERVICE_URL_API}/api"
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "${SERVICE_URL_API}/api"
    ports:
      - "3000"

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${SERVICE_URL_API}/api"
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "${SERVICE_URL_API}/api"
    ports:
      - "3002"

volumes:
  pgdata:
  miniodata:
